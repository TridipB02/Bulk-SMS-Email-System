server:
  port: 8087

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/notificationdb
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:YOUR_MAIL@email.com}
    password: ${MAIL_PASSWORD:YOUR_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:YOUR_JWT_SECRET}

services:
  user-service:
    url: ${USER_SERVICE_URL:http://localhost:8082}

logging:
  level:
    com.nic.notification: DEBUG