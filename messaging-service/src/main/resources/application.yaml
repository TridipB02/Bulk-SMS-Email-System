server:
  port: 8085

spring:
  application:
    name: messaging-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/messagingdb
    username: ${DB_USER:USER_NAME}
    password: ${DB_PASS:YOUR_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:YOUR_MAIL@email.com}
    password: ${MAIL_PASSWORD:YOUR_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:YOUR_JWT_SECRET}

services:
  contact-service:
    url: ${CONTACT_SERVICE_URL:http://localhost:8083}
  campaign-service:
    url: ${CAMPAIGN_SERVICE_URL:http://localhost:8084}

logging:
  level:
    com.nic.messaging: DEBUG