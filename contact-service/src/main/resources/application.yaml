server:
  port: 8083

spring:
  application:
    name: contact-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/contactdb
    username: ${DB_USER:USER_NAME}
    password: ${DB_PASS:YOUR_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
 secret: ${JWT_SECRET:YOUR_JWT_SECRET}

logging:
  level:
    com.nic.contact: DEBUG