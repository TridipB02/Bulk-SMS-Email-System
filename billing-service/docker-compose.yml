version: '3.8'

services:
  billing-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nic-billing-service
    ports:
      - "8086:8086"
    environment:
      DB_HOST: nic-postgres
      DB_USER: postgres
      DB_PASS: YOUR_POSTGRESS_PASSWORD
      JWT_SECRET: YOUR_JWT_SECRET_KEY
      RABBITMQ_HOST: nic-rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
    networks:
      - nic-network
    restart: on-failure

networks:
  nic-network:
    external: true