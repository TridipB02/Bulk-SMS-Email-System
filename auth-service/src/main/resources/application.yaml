server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/authdb
    username: ${DB_USER:USER_NAME}
    password: ${DB_PASS:YOUR_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:YOUR_MAIL@email.com}
    password: ${MAIL_PASSWORD:YOUR_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:YOUR_JWT_SECRET}
  expiration: 86400000

app:
  otp:
    expiry: 5

logging:
  level:
    com.nic.auth: DEBUG